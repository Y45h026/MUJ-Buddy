<a href="{{ url_for('admin_logout') }}" class="btn btn-sm btn-outline-danger float-end">
  Logout
</a>

{% extends "layout.html" %}
{% block content %}
<div class="container mt-4">

  <h2 class="mb-4 text-primary">
    <i class="fa-solid fa-user-shield me-2"></i> Admin Upload Panel
  </h2>

  {% if errors %}
    <div class="alert alert-danger mt-3">
      <ul class="mb-0">
        {% for e in errors %}
          <li>{{ e }}</li>
        {% endfor %}
      </ul>
    </div>
  {% endif %}

  <div class="row g-4">

    <div class="col-md-6">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h5 class="card-title">Upload Professors CSV</h5>
          <form method="post" enctype="multipart/form-data" action="{{ url_for('admin_upload_professors') }}">
            <input type="file" name="file" accept=".csv" class="form-control mb-3" required>
            <button class="btn btn-primary w-100">Upload Professors</button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h5 class="card-title">Upload Timetable CSV</h5>
          <form method="post" enctype="multipart/form-data" action="{{ url_for('admin_upload_timetable') }}">
            <input type="file" name="file" accept=".csv" class="form-control mb-3" required>
            <button class="btn btn-success w-100">Upload Timetable</button>
          </form>
        </div>
      </div>
    </div>

  </div>

  {% if message %}
    <div class="alert alert-info mt-4">{{ message }}</div>
  {% endif %}

</div>
{% endblock %}
